services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_NAME: "School Photo Orders"
      APP_ENV: local
      APP_TIMEZONE: Asia/Jakarta
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: school_photo_orders
      DB_USERNAME: root
      DB_PASSWORD: ""
      DB_CHARSET: utf8mb4
      MAX_STUDENT_UPLOADS: 500
    ports:
      - "8080:80"
    volumes:
      - uploads:/var/www/html/public/uploads
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
  uploads:
